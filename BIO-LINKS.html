<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darío Arrigazzi - La Mente del Fénix</title>
    
    <meta name="description" content="Acompañamiento con Darío Arrigazzi para superar bloqueos, sanar traumas del pasado y transformar tu mente.">

    <!-- Preconexión para optimizar la carga de recursos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Precargar imagen del nuevo banner -->
    <link rel="preload" fetchpriority="high" as="image" href="https://i.imgur.com/8O3Zdcw.png" type="image/png">

    <!-- Tailwind CSS para un diseño rápido y responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes e Iconos -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Estilos personalizados adaptados al tema oscuro */
        :root {
            --bg-color: #2b2b2b;
            --bg-gradient-end: #1a1a1a;
            --text-color: #fbf5e2;
            --brand-pink: #e91e63;
            --brand-gold: #d4af37;
            --dark-accent: #111111;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            background: linear-gradient(170deg, var(--bg-color) 0%, var(--bg-gradient-end) 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .link-container {
            max-width: 400px;
            width: 100%;
        }

        /* Estilo para los botones de enlace, destacado en dorado */
        .link-button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            text-align: center;
            padding: 1rem;
            border-radius: 50px;
            font-weight: 700;
            color: var(--dark-accent);
            text-decoration: none;
            background: linear-gradient(120deg, var(--brand-gold) 0%, #eebd5a 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.5s ease;
        }

        .link-button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); 
            background: linear-gradient(120deg, #eebd5a 0%, var(--brand-gold) 100%);
        }
        
        /* Efecto al presionar en móvil */
        .link-button:active {
            transform: translateY(0px) scale(0.98); 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* --- NUEVOS EFECTOS TIPO REELS --- */
        /* 1. Entrada fluida en cascada */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* 2. Reflejo de lujo en toda la pantalla */
        .luxury-glare {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: linear-gradient(125deg, rgba(255,255,255,0) 0%, rgba(212,175,55,0) 35%, rgba(212,175,55,0.15) 45%, rgba(255,255,255,0.05) 50%, rgba(212,175,55,0.15) 55%, rgba(212,175,55,0) 65%, rgba(255,255,255,0) 100%);
            background-size: 200% 200%;
            animation: glareMove 6s ease-in-out infinite alternate;
            mix-blend-mode: screen;
        }
        @keyframes glareMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* 3. Aura pulsante dorada para la foto de perfil */
        .profile-aura {
            position: absolute;
            top: -6px; right: -6px; bottom: -6px; left: -6px;
            background: radial-gradient(circle, var(--brand-gold) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: auraBreathe 3s ease-in-out infinite alternate;
            opacity: 0.4;
        }
        @keyframes auraBreathe {
            0% { transform: scale(0.9); opacity: 0.1; }
            100% { transform: scale(1.15); opacity: 0.6; }
        }

        /* Nuevo efecto eléctrico: destello agudo con núcleo blanco y borde dorado */
        @keyframes electric-pulse {
            0%, 100% { box-shadow: 0 0 0 rgba(212, 175, 55, 0); }
            5% { box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.6), 0 0 15px 4px rgba(212, 175, 55, 0.8); }
            10% { box-shadow: 0 0 2px 0 rgba(255, 255, 255, 0.2), 0 0 5px 1px rgba(212, 175, 55, 0.4); }
            12% { box-shadow: 0 0 6px 1px rgba(255, 255, 255, 0.5), 0 0 12px 3px rgba(212, 175, 55, 0.7); }
            16% { box-shadow: 0 0 0 rgba(212, 175, 55, 0); }
        }

        .btn-electric {
            animation: electric-pulse 3s infinite;
        }

        @keyframes text-flow {
            to {
                background-position: 200% center;
            }
        }

        /* Efecto de imagen de perfil */
        .profile-image-container {
            position: relative;
            width: 128px;
            height: 128px;
            margin: -2.5rem auto 0 auto; 
            z-index: 10;
        }
        .profile-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out;
        }
        .profile-image-container .hover-image {
            opacity: 0;
        }
        .profile-image-container:hover .hover-image {
            opacity: 1;
        }
        .profile-image-container:hover .default-image {
            opacity: 0;
        }
        
        /* Cita animada con dorado */
        .animated-quote {
            font-style: italic;
            font-weight: 500;
            color: transparent;
            background-image: linear-gradient(90deg, var(--brand-gold), var(--brand-pink), var(--text-color), var(--brand-gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: text-flow 10s linear infinite;
        }

        /* Iconos de redes sociales */
        .social-icon {
            font-size: 1.75rem;
            color: var(--text-color);
            transition: color 0.3s ease, transform 0.3s ease;
        }
        .social-icon:hover {
            transform: scale(1.1);
            color: var(--brand-pink);
        }
        .social-icon.email-icon:hover {
            color: var(--brand-gold);
        }
        .social-icon.youtube-icon:hover {
            color: #FF0000;
        }
    </style>
</head>
<body>

    <!-- Reflejo de pantalla completa -->
    <div class="luxury-glare"></div>

    <div class="link-container text-center">

        <!-- Banner Nuevo -->
        <img src="https://i.imgur.com/8O3Zdcw.png" alt="Banner La Mente del Fénix" class="w-full h-auto rounded-lg shadow-lg animate-in" width="1200" height="400">

        <!-- Imagen de Perfil e Info -->
        <header class="mb-8 animate-in delay-1">
            <div class="profile-image-container rounded-full shadow-xl border-4 border-[#1a1a1a] overflow-hidden relative">
                <div class="profile-aura"></div>
                <img src="https://i.imgur.com/T6RLxgX.webp" alt="Retrato de Darío Arrigazzi" class="profile-image default-image">
                <img src="https://i.imgur.com/XlmLArU.webp" alt="Retrato alternativo de Darío Arrigazzi" class="profile-image hover-image">
            </div>
            
            <div class="pt-2"> 
                <p class="mt-4 font-bold text-xl text-[#fbf5e2]">Despierta tu Potencial.</p>
                <p class="mt-2 text-sm max-w-xs mx-auto text-[#fbf5e2]/80 font-medium">
                    Te acompaño a superar tus bloqueos, sanar tu pasado y transformar tu mente.
                </p>
            </div>
        </header>

        <!-- Enlaces Principales (Con Flexbox para separación) -->
        <main class="flex flex-col gap-4 w-full">
            <!-- Link Psicoterapia (Prioridad #1) -->
            <div class="animate-in delay-2 w-full">
                <a href="https://www.lamentedelfenix.com/psicoterapia.html" target="_blank" class="link-button btn-electric">
                    <i class="fas fa-calendar-check text-xl"></i> Reserva tu Sesión 1:1
                </a>
            </div>

            <!-- Link Web Principal -->
            <div class="animate-in delay-3 w-full">
                <a href="https://www.lamentedelfenix.com" target="_blank" class="link-button">
                    <i class="fas fa-globe text-xl"></i> Descubre cómo puedo ayudarte
                </a>
            </div>
            
            <!-- Link YouTube -->
            <div class="animate-in delay-4 w-full">
                <a href="https://www.youtube.com/channel/UC55t1Y4iGWWcXO_iU2QC-jA" target="_blank" class="link-button">
                    <i class="fab fa-youtube text-xl text-red-600"></i> Mi Canal de YouTube
                </a>
            </div>
        </main>
        
        <!-- Cita -->
        <section class="mt-8 px-4 animate-in delay-5">
            <p class="animated-quote text-base">
                "Lo que das a los demás te lo das a ti mismo. Como es adentro, es afuera."
            </p>
        </section>

        <!-- Redes Sociales -->
        <footer class="mt-8 animate-in delay-5">
            <div class="flex justify-center items-center gap-6">
                <a href="https://www.instagram.com/darioarrigazzi/" target="_blank" aria-label="Instagram">
                    <i class="fab fa-instagram social-icon"></i>
                </a>
                <a href="https://www.youtube.com/channel/UC55t1Y4iGWWcXO_iU2QC-jA" target="_blank" aria-label="YouTube">
                    <i class="fab fa-youtube social-icon youtube-icon"></i>
                </a>
                <a href="mailto:lamentedelfenix@gmail.com" target="_blank" aria-label="Email">
                    <i class="fas fa-envelope social-icon email-icon"></i>
                </a>
            </div>
            <p class="text-xs text-[#fbf5e2]/50 mt-6">&copy; 2026 La Mente del Fénix</p>
        </footer>

    </div>

</body>
</html>
